name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  analyze-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2
        with:
          flutter-version: 3.41.9
          channel: stable
          cache: true

      - run: flutter pub get --enforce-lockfile
      - run: dart pub outdated --json | dart run tool/check_pub_advisories.dart
      - run: flutter analyze
      - run: flutter test
