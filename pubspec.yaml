name: my_tokens
description: "MyTokens - an offline, secure TOTP authenticator."
publish_to: 'none'
repository: https://github.com/guilhermegsr/my_tokens
version: 1.1.3+5

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: 0.20.2

  provider: ^6.1.2

  crypto: ^3.0.5
  cryptography: ^2.7.0
  # Native AES-GCM / Argon2id on Android & iOS — the pure-Dart Argon2id
  # is slow enough to make backups feel frozen on real devices.
  cryptography_flutter: ^2.3.2
  flutter_secure_storage: ^9.2.2

  mobile_scanner: ^5.2.3

  file_picker: ^8.1.2
  share_plus: ^10.1.1
  path_provider: ^2.1.4

  local_auth: ^2.3.0

  # Reads the build's own version name (no network, no permissions) so the
  # displayed version can never drift from the release.
  package_info_plus: ^8.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true
  generate: true

# Branded launcher icon (indigo shield, matching the in-app accent).
# Regenerate with: dart run flutter_launcher_icons
flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#1E87F2"
  adaptive_icon_foreground: "assets/icon/app_icon_foreground.png"
